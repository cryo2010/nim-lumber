name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mm: [orc, arc, atomicArc]
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      # Steps call scripts/tests.nims via `nim e` rather than the nimble
      # tasks: nimble 0.22 exits 0 when a task fails, so a nimble-invoked
      # step can never turn red.
      - name: Install dependencies
        run: nimble install -y --depsOnly

      - name: Run tests (--mm:${{ matrix.mm }})
        run: nim e scripts/tests.nims test
        env:
          LUMBER_TEST_MM: ${{ matrix.mm }}

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Run tests under valgrind (--mm:${{ matrix.mm }})
        run: nim e scripts/tests.nims valgrind
        env:
          LUMBER_TEST_MM: ${{ matrix.mm }}

      - name: Run threaded tests under helgrind (--mm:${{ matrix.mm }})
        run: nim e scripts/tests.nims helgrind
        env:
          LUMBER_TEST_MM: ${{ matrix.mm }}

      - name: Build CLI
        if: matrix.mm == 'orc'
        run: nim e scripts/tests.nims build

