name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mm: [orc, arc, atomicArc]
    steps:
      - uses: actions/checkout@v4

      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Run tests (--mm:${{ matrix.mm }})
        run: nimble test -y
        env:
          LUMBER_TEST_MM: ${{ matrix.mm }}

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Run tests under valgrind (--mm:${{ matrix.mm }})
        run: nimble testValgrind -y
        env:
          LUMBER_TEST_MM: ${{ matrix.mm }}

      - name: Build CLI
        if: matrix.mm == 'orc'
        run: nimble buildProd -y

